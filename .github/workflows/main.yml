name: Finance Agent Daily Run

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 8 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  finance-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4 # 建议升级到最新版本
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v5 # 建议升级到最新版本
      with:
        python-version: '3.10'
    
    # 新增：缓存 pip 依赖，大幅缩短安装时间
    - name: 配置 pip 缓存
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: 安装依赖
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 运行金融分析脚本
      env:
        AI_MODEL: ${{ secrets.AI_MODEL }}
        AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: |
        python finance_agent.py
